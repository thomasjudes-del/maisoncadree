name: Publish Buffer assets

on:
  push:
    branches: [main]
    paths:
      - '.buffer-assets/**'

permissions:
  contents: write

jobs:
  publish-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Decode queued social assets
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p public/social

          manifests=(.buffer-assets/*.manifest)
          for manifest in "${manifests[@]}"; do
            base="${manifest%.manifest}"
            filename="$(tr -d '\r\n' < "$manifest")"
            cat "${base}".part* | tr -d '\r\n' | base64 --decode > "public/social/${filename}"
            rm -f "${base}".part* "$manifest"
          done

      - name: Commit published assets
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/social .buffer-assets
          git commit -m "Publish social media assets"
          git push
